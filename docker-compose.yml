services:
  postgres:
    image: postgres:15-alpine
    container_name: locfly-postgres
    restart: always
    environment:
      POSTGRES_USER: locfly_user
      POSTGRES_PASSWORD: locfly_password
      POSTGRES_DB: locfly_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: locfly-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
